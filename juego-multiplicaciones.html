<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplicación Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 50%, #c44569 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            background: linear-gradient(135deg, #ff6b6b, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #c44569 100%);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.5);
        }

        .mode-icon {
            font-size: 2em;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: scale(1.05);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
        }

        .streak-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .timer-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .combo-card {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .streak-fire {
            font-size: 3em;
            animation: burn 0.5s infinite alternate;
        }

        @keyframes burn {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .question-area {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 50px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
        }

        .question-text {
            font-size: 4em;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .answer-input {
            width: 300px;
            padding: 20px;
            font-size: 2em;
            text-align: center;
            border: 4px solid #667eea;
            border-radius: 15px;
            font-weight: bold;
            outline: none;
            transition: all 0.3s;
        }

        .answer-input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
            transform: scale(1.05);
        }

        .submit-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #c44569 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 15px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .feedback {
            margin-top: 30px;
            padding: 30px;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .feedback.correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #0f5132;
            border: 4px solid #0f5132;
        }

        .feedback.incorrect {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            color: #856404;
            border: 4px solid #856404;
        }

        .achievement-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            font-weight: bold;
            font-size: 1.2em;
            animation: slideInRight 0.5s ease-out;
            z-index: 1000;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .combo-display {
            font-size: 3em;
            color: #ff6b6b;
            font-weight: bold;
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #c44569, #ff6b6b);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            transition: width 0.3s;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0;
            font-size: 1.2em;
        }

        .game-over {
            text-align: center;
            padding: 40px;
        }

        .final-score {
            font-size: 4em;
            background: linear-gradient(135deg, #ff6b6b, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            margin: 30px 0;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .medals-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .medal {
            font-size: 3em;
            filter: grayscale(100%);
            opacity: 0.3;
            transition: all 0.3s;
        }

        .medal.earned {
            filter: grayscale(0%);
            opacity: 1;
            animation: medalBounce 0.6s;
        }

        @keyframes medalBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5) rotate(10deg); }
        }

        .hint {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
            margin-top: 20px;
            text-align: left;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .question-text {
                font-size: 2.5em;
            }
            
            .answer-input {
                width: 100%;
                font-size: 1.5em;
            }
            
            .game-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header>
            <h1>✖️ Multiplicación Master</h1>
            <p class="subtitle">¡Domina las multiplicaciones y conviértete en un maestro!</p>
        </header>

        <div class="mode-selector" id="modeSelector">
            <button class="mode-btn active" onclick="selectMode('naturales')" data-mode="naturales">
                <span class="mode-icon">🔢</span>
                <span>Naturales</span>
                <span style="font-size: 0.8em; opacity: 0.9;">2 × 3 = ?</span>
            </button>
            <button class="mode-btn" onclick="selectMode('enteros')" data-mode="enteros">
                <span class="mode-icon">➕➖</span>
                <span>Enteros</span>
                <span style="font-size: 0.8em; opacity: 0.9;">-4 × 5 = ?</span>
            </button>
            <button class="mode-btn" onclick="selectMode('fracciones')" data-mode="fracciones">
                <span class="mode-icon">🍰</span>
                <span>Fracciones</span>
                <span style="font-size: 0.8em; opacity: 0.9;">2/3 × 3/4 = ?</span>
            </button>
            <button class="mode-btn" onclick="selectMode('decimales')" data-mode="decimales">
                <span class="mode-icon">📊</span>
                <span>Decimales</span>
                <span style="font-size: 0.8em; opacity: 0.9;">1.5 × 2.4 = ?</span>
            </button>
        </div>

        <div class="medals-display" id="medals">
            <span class="medal" data-medal="bronze" title="Bronce: 5 rachas">🥉</span>
            <span class="medal" data-medal="silver" title="Plata: 10 rachas">🥈</span>
            <span class="medal" data-medal="gold" title="Oro: 15 rachas">🥇</span>
            <span class="medal" data-medal="diamond" title="Diamante: 20 rachas">💎</span>
            <span class="medal" data-medal="fire" title="Fuego: 30 rachas">🔥</span>
            <span class="medal" data-medal="master" title="Maestro: 50 correctas">👑</span>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-label">⭐ Puntos</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-card streak-card">
                <div class="stat-label">🔥 Racha</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat-card timer-card">
                <div class="stat-label">⏱️ Tiempo</div>
                <div class="stat-value" id="timer">0s</div>
            </div>
            <div class="stat-card combo-card">
                <div class="stat-label">🎯 Precisión</div>
                <div class="stat-value" id="accuracy">100%</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 0%"></div>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <span class="level-badge" id="levelBadge">Nivel 1: Principiante</span>
            </div>
        </div>

        <div id="gameContent"></div>
    </div>

    <script>
        let currentMode = 'naturales';
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let totalAnswered = 0;
        let correctAnswers = 0;
        let currentQuestion = null;
        let timeElapsed = 0;
        let timerInterval = null;
        let level = 1;
        let questionsForNextLevel = 10;
        let questionsInMode = 0;
        const QUESTIONS_PER_MODE = 5;
        let totalGameTime = 0;
        let gameStartTime = null;

        const medals = {
            bronze: false,
            silver: false,
            gold: false,
            diamond: false,
            fire: false,
            master: false
        };

        const levels = [
            { name: "Principiante", threshold: 0 },
            { name: "Aprendiz", threshold: 10 },
            { name: "Competente", threshold: 25 },
            { name: "Experto", threshold: 50 },
            { name: "Maestro", threshold: 100 },
            { name: "Leyenda", threshold: 200 }
        ];

        function selectMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            
            // Reset para nuevo modo
            score = 0;
            streak = 0;
            totalAnswered = 0;
            correctAnswers = 0;
            timeElapsed = 0;
            questionsInMode = 0;
            gameStartTime = Date.now();
            
            generateQuestion();
        }

        function generateQuestion() {
            switch(currentMode) {
                case 'naturales':
                    currentQuestion = generateNaturales();
                    break;
                case 'enteros':
                    currentQuestion = generateEnteros();
                    break;
                case 'fracciones':
                    currentQuestion = generateFracciones();
                    break;
                case 'decimales':
                    currentQuestion = generateDecimales();
                    break;
            }
            displayQuestion();
        }

        function generateNaturales() {
            const maxNum = Math.min(5 + level * 2, 20);
            const num1 = Math.floor(Math.random() * maxNum) + 1;
            const num2 = Math.floor(Math.random() * maxNum) + 1;
            
            const hints = [
                `Recuerda las tablas de multiplicar`,
                `Puedes sumar repetidamente`,
                `Piensa en grupos de objetos`,
                `Descompón en multiplicaciones más fáciles`,
                `Si lo necesitas, usa los dedos`
            ];
            
            return {
                display: `${num1} × ${num2}`,
                answer: num1 * num2,
                hint: hints[Math.floor(Math.random() * hints.length)]
            };
        }

        function generateEnteros() {
            const maxNum = Math.min(5 + level, 15);
            const num1 = Math.floor(Math.random() * maxNum * 2) - maxNum;
            const num2 = Math.floor(Math.random() * maxNum * 2) - maxNum;
            
            let hint = "Regla de signos: ";
            if (num1 >= 0 && num2 >= 0) hint += "positivo × positivo = positivo";
            else if (num1 < 0 && num2 < 0) hint += "negativo × negativo = positivo";
            else hint += "signos diferentes = negativo";
            
            return {
                display: `${num1} × ${num2}`,
                answer: num1 * num2,
                hint: hint
            };
        }

        function generateFracciones() {
            const denominadores = [2, 3, 4, 5, 6, 8];
            const denom1 = denominadores[Math.floor(Math.random() * denominadores.length)];
            const denom2 = denominadores[Math.floor(Math.random() * denominadores.length)];
            const num1 = Math.floor(Math.random() * (denom1 - 1)) + 1;
            const num2 = Math.floor(Math.random() * (denom2 - 1)) + 1;
            
            const answerNum = num1 * num2;
            const answerDenom = denom1 * denom2;
            
            // Simplificar
            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            const divisor = gcd(answerNum, answerDenom);
            const simplifiedNum = answerNum / divisor;
            const simplifiedDenom = answerDenom / divisor;
            
            return {
                display: `${num1}/${denom1} × ${num2}/${denom2}`,
                answer: `${simplifiedNum}/${simplifiedDenom}`,
                hint: `Multiplica numeradores entre sí y denominadores entre sí. Luego simplifica si es posible.`,
                acceptedAnswers: [`${simplifiedNum}/${simplifiedDenom}`, `${answerNum}/${answerDenom}`]
            };
        }

        function generateDecimales() {
            const maxNum = 9;
            
            // Generar números con exactamente 2 decimales
            const num1 = (Math.floor(Math.random() * maxNum * 100) + 100) / 100;
            const num2 = (Math.floor(Math.random() * maxNum * 100) + 100) / 100;
            const answer = Math.round(num1 * num2 * 100) / 100;
            
            return {
                display: `${num1.toFixed(2)} × ${num2.toFixed(2)}`,
                answer: answer,
                hint: `Multiplica como si fueran enteros, luego coloca la coma contando los decimales totales`,
                acceptedAnswers: [answer.toString(), answer.toFixed(1), answer.toFixed(2)]
            };
        }

        function displayQuestion() {
            // Verificar si completó los 5 ejercicios del modo
            if (questionsInMode >= QUESTIONS_PER_MODE) {
                showModeComplete();
                return;
            }

            const content = `
                <div class="question-area">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <span style="background: #667eea; color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold;">
                            Ejercicio ${questionsInMode + 1} de ${QUESTIONS_PER_MODE}
                        </span>
                    </div>
                    <div class="question-text">${currentQuestion.display} = ?</div>
                    <input type="text" id="answerInput" class="answer-input" placeholder="Tu respuesta" autocomplete="off">
                    <button class="submit-btn" onclick="checkAnswer()">Verificar ✓</button>
                    <div id="feedback"></div>
                    <div class="hint">💡 ${currentQuestion.hint}</div>
                </div>
            `;
            document.getElementById('gameContent').innerHTML = content;
            document.getElementById('answerInput').focus();
            
            // Enter para enviar
            document.getElementById('answerInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') checkAnswer();
            });

            updateStats();
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('answerInput').value.trim();
            const feedbackDiv = document.getElementById('feedback');
            
            if (!userAnswer) return;

            totalAnswered++;
            questionsInMode++;
            let isCorrect = false;

            if (currentQuestion.acceptedAnswers) {
                isCorrect = currentQuestion.acceptedAnswers.some(ans => 
                    userAnswer.toLowerCase().replace(/\s+/g, '') === ans.toLowerCase().replace(/\s+/g, '')
                );
            } else {
                isCorrect = parseFloat(userAnswer) === currentQuestion.answer;
            }

            if (isCorrect) {
                correctAnswers++;
                streak++;
                maxStreak = Math.max(maxStreak, streak);
                
                const basePoints = 10;
                const streakBonus = streak * 5;
                const speedBonus = timeElapsed < 5 ? 20 : timeElapsed < 10 ? 10 : 0;
                const points = basePoints + streakBonus + speedBonus;
                score += points;

                let message = '¡Correcto! 🎉';
                if (streak >= 5) message = '¡RACHA INCREÍBLE! 🔥';
                if (streak >= 10) message = '¡IMPARABLE! ⚡';
                if (streak >= 20) message = '¡LEYENDA! 👑';

                feedbackDiv.innerHTML = `
                    <div class="feedback correct">
                        ${message}<br>
                        +${points} puntos
                        ${streak > 1 ? `<div class="combo-display">COMBO x${streak}</div>` : ''}
                    </div>
                `;

                checkMedals();
                checkLevelUp();
            } else {
                streak = 0;
                feedbackDiv.innerHTML = `
                    <div class="feedback incorrect">
                        ❌ Incorrecto<br>
                        La respuesta correcta es: <strong>${currentQuestion.answer}</strong>
                    </div>
                `;
            }

            updateStats();
            setTimeout(() => {
                timeElapsed = 0;
                generateQuestion();
            }, 2000);
        }

        function showModeComplete() {
            const totalTime = Math.floor((Date.now() - gameStartTime) / 1000);
            const minutes = Math.floor(totalTime / 60);
            const seconds = totalTime % 60;
            const accuracy = Math.round((correctAnswers / totalAnswered) * 100);
            
            let timeDisplay = '';
            if (minutes > 0) {
                timeDisplay = `${minutes} min ${seconds} seg`;
            } else {
                timeDisplay = `${seconds} segundos`;
            }
            
            let performanceMessage = '';
            let performanceEmoji = '';
            
            if (accuracy === 100) {
                performanceMessage = '¡PERFECTO! 👑';
                performanceEmoji = '🌟';
            } else if (accuracy >= 80) {
                performanceMessage = '¡Excelente trabajo!';
                performanceEmoji = '⭐';
            } else if (accuracy >= 60) {
                performanceMessage = '¡Buen intento!';
                performanceEmoji = '👍';
            } else {
                performanceMessage = 'Sigue practicando';
                performanceEmoji = '💪';
            }
            
            const modeNames = {
                naturales: 'Números Naturales',
                enteros: 'Números Enteros',
                fracciones: 'Fracciones',
                decimales: 'Números Decimales'
            };

            const content = `
                <div class="game-over">
                    <h2 style="color: #667eea; font-size: 2.5em; margin-bottom: 20px;">
                        ${performanceEmoji} ¡Modo Completado! ${performanceEmoji}
                    </h2>
                    
                    <div class="level-badge" style="font-size: 1.5em; margin: 20px 0;">
                        ${modeNames[currentMode]}
                    </div>
                    
                    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 20px; margin: 30px 0;">
                        <div style="font-size: 1.3em; margin-bottom: 20px;">⏱️ Tiempo Total</div>
                        <div style="font-size: 3em; font-weight: bold; margin-bottom: 10px;">${timeDisplay}</div>
                        <div style="font-size: 1em; opacity: 0.9;">para completar ${QUESTIONS_PER_MODE} ejercicios</div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0;">
                        <div style="background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); padding: 25px; border-radius: 15px;">
                            <div style="font-size: 1.1em; margin-bottom: 10px;">🎯 Precisión</div>
                            <div style="font-size: 2.5em; font-weight: bold; color: #0f5132;">${accuracy}%</div>
                            <div style="font-size: 0.9em; margin-top: 5px;">${correctAnswers}/${totalAnswered} correctas</div>
                        </div>
                        
                        <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); padding: 25px; border-radius: 15px; color: white;">
                            <div style="font-size: 1.1em; margin-bottom: 10px;">🔥 Racha Máxima</div>
                            <div style="font-size: 2.5em; font-weight: bold;">${maxStreak}</div>
                            <div style="font-size: 0.9em; margin-top: 5px;">respuestas seguidas</div>
                        </div>
                        
                        <div style="background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%); padding: 25px; border-radius: 15px; color: white;">
                            <div style="font-size: 1.1em; margin-bottom: 10px;">⭐ Puntos</div>
                            <div style="font-size: 2.5em; font-weight: bold;">${score}</div>
                            <div style="font-size: 0.9em; margin-top: 5px;">puntos totales</div>
                        </div>
                    </div>
                    
                    <div style="font-size: 1.5em; font-weight: bold; color: #667eea; margin: 30px 0;">
                        ${performanceMessage}
                    </div>
                    
                    <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 30px;">
                        <button class="restart-btn" onclick="selectMode('${currentMode}')">
                            🔄 Repetir ${modeNames[currentMode]}
                        </button>
                        <button class="restart-btn" onclick="location.reload()">
                            🏠 Menú Principal
                        </button>
                    </div>
                    
                    <div style="margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 15px; border-left: 4px solid #667eea;">
                        <div style="font-weight: bold; margin-bottom: 10px; color: #667eea;">💡 Consejo</div>
                        <div style="color: #666;">
                            ${accuracy === 100 ? 
                                '¡Increíble! Ahora prueba otro modo para seguir mejorando.' :
                                accuracy >= 80 ?
                                'Muy bien. Intenta mejorar tu velocidad manteniendo la precisión.' :
                                'Practica más para mejorar tu precisión. ¡No te rindas!'
                            }
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('gameContent').innerHTML = content;
        }

        function checkMedals() {
            if (streak >= 5 && !medals.bronze) {
                medals.bronze = true;
                unlockMedal('bronze', 'Bronce', '¡5 respuestas seguidas!');
            }
            if (streak >= 10 && !medals.silver) {
                medals.silver = true;
                unlockMedal('silver', 'Plata', '¡10 respuestas seguidas!');
            }
            if (streak >= 15 && !medals.gold) {
                medals.gold = true;
                unlockMedal('gold', 'Oro', '¡15 respuestas seguidas!');
            }
            if (streak >= 20 && !medals.diamond) {
                medals.diamond = true;
                unlockMedal('diamond', 'Diamante', '¡20 respuestas seguidas!');
            }
            if (streak >= 30 && !medals.fire) {
                medals.fire = true;
                unlockMedal('fire', 'Fuego', '¡30 respuestas seguidas!');
            }
            if (correctAnswers >= 50 && !medals.master) {
                medals.master = true;
                unlockMedal('master', 'Maestro', '¡50 respuestas correctas!');
            }
        }

        function unlockMedal(medalType, name, message) {
            const medal = document.querySelector(`[data-medal="${medalType}"]`);
            medal.classList.add('earned');
            
            showAchievement(`🏆 ${name} desbloqueado!`, message);
        }

        function showAchievement(title, message) {
            const popup = document.createElement('div');
            popup.className = 'achievement-popup';
            popup.innerHTML = `
                <div style="font-size: 1.5em; margin-bottom: 10px;">${title}</div>
                <div>${message}</div>
            `;
            document.body.appendChild(popup);
            
            setTimeout(() => {
                popup.remove();
            }, 3000);
        }

        function checkLevelUp() {
            const newLevel = levels.findIndex(l => score < l.threshold);
            const levelIndex = newLevel === -1 ? levels.length - 1 : newLevel - 1;
            
            if (levelIndex + 1 > level) {
                level = levelIndex + 1;
                showAchievement(`🎊 ¡NIVEL ${level}!`, `Has alcanzado: ${levels[levelIndex].name}`);
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('timer').textContent = timeElapsed + 's';
            
            const accuracy = totalAnswered > 0 ? Math.round((correctAnswers / totalAnswered) * 100) : 100;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            const progress = Math.min((score % 100) / 100 * 100, 100);
            document.getElementById('progress').style.width = progress + '%';
            
            const levelIndex = Math.min(level - 1, levels.length - 1);
            document.getElementById('levelBadge').textContent = `Nivel ${level}: ${levels[levelIndex].name}`;
        }

        // Timer
        setInterval(() => {
            timeElapsed++;
            updateStats();
        }, 1000);

        // Iniciar juego
        generateQuestion();
    </script>
</body>
</html>
