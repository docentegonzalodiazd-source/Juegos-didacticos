<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío de Potencias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .streak-indicator {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .level-indicator {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .medals-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .medal {
            font-size: 2em;
            filter: grayscale(100%);
            opacity: 0.3;
            transition: all 0.3s;
        }

        .medal.earned {
            filter: grayscale(0%);
            opacity: 1;
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            border: 3px solid #667eea;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .property-hint {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #2196f3;
        }

        .property-hint strong {
            color: #1976d2;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            border: 3px solid #667eea;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            color: #333;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .option-btn.correct {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
            animation: pulse 0.5s;
        }

        .option-btn.incorrect {
            background: #f44336;
            border-color: #f44336;
            color: white;
            animation: shake 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .feedback.correct {
            background: #c8e6c9;
            color: #2e7d32;
            border: 3px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffcdd2;
            color: #c62828;
            border: 3px solid #f44336;
        }

        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: all 0.3s;
        }

        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .game-over {
            text-align: center;
            padding: 40px;
        }

        .game-over h2 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 3em;
            color: #764ba2;
            font-weight: bold;
            margin: 20px 0;
        }

        .achievement-unlocked {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .restart-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
        }

        .timer {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.2em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .explanation {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #ffc107;
        }

        .explanation strong {
            color: #ff6f00;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .question-text {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🎯 Desafío de Potencias</h1>
            <p>Domina las propiedades de las potencias en los racionales</p>
        </header>

        <div class="medals-container" id="medals">
            <span class="medal" data-medal="bronze" title="Bronce: 3 rachas">🥉</span>
            <span class="medal" data-medal="silver" title="Plata: 5 rachas">🥈</span>
            <span class="medal" data-medal="gold" title="Oro: 7 rachas">🥇</span>
            <span class="medal" data-medal="diamond" title="Diamante: 10 rachas">💎</span>
            <span class="medal" data-medal="master" title="Maestro: Perfecto">👑</span>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-label">Puntos</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-card streak-indicator">
                <div class="stat-label">🔥 Racha</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat-card level-indicator">
                <div class="stat-label">Nivel</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Aciertos</div>
                <div class="stat-value" id="correct">0/0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 0%"></div>
        </div>

        <div id="gameContent"></div>
    </div>

    <script>
        const questions = [
            // NIVEL 1: BÁSICO (Preguntas 1-5)
            {
                question: "(2/3)² =",
                options: ["4/9", "2/9", "4/6", "2/6"],
                correct: 0,
                property: "Potencia de una fracción",
                explanation: "Se eleva tanto el numerador como el denominador: (2/3)² = 2²/3² = 4/9",
                difficulty: 1
            },
            {
                question: "(1/2)³ =",
                options: ["1/8", "1/6", "3/2", "1/9"],
                correct: 0,
                property: "Potencia de una fracción",
                explanation: "Se eleva el numerador y el denominador: (1/2)³ = 1³/2³ = 1/8",
                difficulty: 1
            },
            {
                question: "(3/5)² =",
                options: ["9/25", "6/10", "3/25", "9/10"],
                correct: 0,
                property: "Potencia de una fracción",
                explanation: "Elevamos numerador y denominador: (3/5)² = 3²/5² = 9/25",
                difficulty: 1
            },
            {
                question: "(2/3)⁰ =",
                options: ["1", "0", "2/3", "3/2"],
                correct: 0,
                property: "Potencia cero",
                explanation: "Cualquier número (excepto 0) elevado a la potencia 0 es igual a 1: (2/3)⁰ = 1",
                difficulty: 1
            },
            {
                question: "(5/4)¹ =",
                options: ["5/4", "1", "4/5", "5"],
                correct: 0,
                property: "Potencia uno",
                explanation: "Cualquier número elevado a 1 es igual a sí mismo: (5/4)¹ = 5/4",
                difficulty: 1
            },
            
            // NIVEL 2: INTERMEDIO BAJO (Preguntas 6-10)
            {
                question: "(3/4)² × (3/4)³ =",
                options: ["(3/4)⁵", "(3/4)⁶", "9/16", "(6/7)⁵"],
                correct: 0,
                property: "Multiplicación de potencias de igual base",
                explanation: "Cuando multiplicamos potencias de igual base, sumamos los exponentes: (3/4)² × (3/4)³ = (3/4)²⁺³ = (3/4)⁵",
                difficulty: 2
            },
            {
                question: "(2/5)⁴ ÷ (2/5)² =",
                options: ["(2/5)²", "(2/5)⁶", "4/25", "2/5"],
                correct: 0,
                property: "División de potencias de igual base",
                explanation: "Cuando dividimos potencias de igual base, restamos los exponentes: (2/5)⁴ ÷ (2/5)² = (2/5)⁴⁻² = (2/5)²",
                difficulty: 2
            },
            {
                question: "[(1/3)²]³ =",
                options: ["(1/3)⁶", "(1/3)⁵", "1/9", "1/27"],
                correct: 0,
                property: "Potencia de una potencia",
                explanation: "Cuando elevamos una potencia a otra potencia, multiplicamos los exponentes: [(1/3)²]³ = (1/3)²ˣ³ = (1/3)⁶",
                difficulty: 2
            },
            {
                question: "(1/4)² × (1/4)¹ =",
                options: ["(1/4)³", "(1/4)²", "1/16", "2/8"],
                correct: 0,
                property: "Multiplicación de potencias de igual base",
                explanation: "Sumamos los exponentes: (1/4)² × (1/4)¹ = (1/4)²⁺¹ = (1/4)³",
                difficulty: 2
            },
            {
                question: "(2/3)⁵ ÷ (2/3)³ =",
                options: ["(2/3)²", "(2/3)⁸", "4/9", "8/27"],
                correct: 0,
                property: "División de potencias de igual base",
                explanation: "Restamos los exponentes: (2/3)⁵ ÷ (2/3)³ = (2/3)⁵⁻³ = (2/3)²",
                difficulty: 2
            },
            
            // NIVEL 3: INTERMEDIO (Preguntas 11-15)
            {
                question: "(3/4)⁻¹ =",
                options: ["4/3", "3/4", "-3/4", "1"],
                correct: 0,
                property: "Exponente negativo",
                explanation: "Un exponente -1 invierte la fracción: (3/4)⁻¹ = 4/3",
                difficulty: 2
            },
            {
                question: "[(2/3)³]² =",
                options: ["(2/3)⁶", "(2/3)⁹", "8/27", "64/729"],
                correct: 0,
                property: "Potencia de una potencia",
                explanation: "Multiplicamos exponentes: [(2/3)³]² = (2/3)³ˣ² = (2/3)⁶",
                difficulty: 2
            },
            {
                question: "(1/2)⁻² =",
                options: ["4", "1/4", "-4", "-1/4"],
                correct: 0,
                property: "Exponente negativo",
                explanation: "Un exponente negativo invierte la fracción: (1/2)⁻² = (2/1)² = 4",
                difficulty: 3
            },
            {
                question: "(2/5)⁻³ =",
                options: ["125/8", "8/125", "-8/125", "6/15"],
                correct: 0,
                property: "Exponente negativo",
                explanation: "Invertimos y elevamos: (2/5)⁻³ = (5/2)³ = 5³/2³ = 125/8",
                difficulty: 3
            },
            {
                question: "(3/2)² × (2/3)² =",
                options: ["1", "9/4", "4/9", "6/6"],
                correct: 0,
                property: "Multiplicación de potencias - fracciones inversas",
                explanation: "Son fracciones inversas: (3/2)² × (2/3)² = (3/2 × 2/3)² = (1)² = 1",
                difficulty: 3
            },
            
            // NIVEL 4: AVANZADO (Preguntas 16-20)
            {
                question: "(2/3 × 1/4)² =",
                options: ["1/36", "2/12", "1/9", "4/9"],
                correct: 0,
                property: "Potencia de un producto",
                explanation: "Primero multiplicamos: 2/3 × 1/4 = 2/12 = 1/6. Luego: (1/6)² = 1/36",
                difficulty: 3
            },
            {
                question: "(4/9)^(1/2) =",
                options: ["2/3", "4/9", "16/81", "1"],
                correct: 0,
                property: "Raíz como potencia fraccionaria",
                explanation: "La raíz cuadrada es equivalente a elevar a 1/2: (4/9)^(1/2) = √(4/9) = 2/3",
                difficulty: 3
            },
            {
                question: "[(1/2)²]³ × (1/2)⁰ =",
                options: ["(1/2)⁶", "(1/2)⁵", "1/64", "1"],
                correct: 0,
                property: "Combinación de propiedades",
                explanation: "[(1/2)²]³ = (1/2)⁶, y (1/2)⁰ = 1. Entonces: (1/2)⁶ × 1 = (1/2)⁶",
                difficulty: 3
            },
            {
                question: "(3/5)⁻² × (3/5)⁴ =",
                options: ["(3/5)²", "(3/5)⁻⁶", "9/25", "1"],
                correct: 0,
                property: "Multiplicación con exponentes negativos",
                explanation: "Sumamos exponentes: (3/5)⁻² × (3/5)⁴ = (3/5)⁻²⁺⁴ = (3/5)²",
                difficulty: 3
            },
            {
                question: "[(2/3)⁻²]⁻¹ =",
                options: ["(2/3)²", "(2/3)⁻²", "9/4", "4/9"],
                correct: 0,
                property: "Doble exponente negativo",
                explanation: "Multiplicamos exponentes: [(2/3)⁻²]⁻¹ = (2/3)⁽⁻²⁾ˣ⁽⁻¹⁾ = (2/3)²",
                difficulty: 3
            },
            
            // NIVEL 5: EXPERTO (Preguntas 21-25)
            {
                question: "(1/3)⁶ ÷ (1/3)⁸ =",
                options: ["(1/3)⁻²", "(1/3)¹⁴", "1/9", "9"],
                correct: 0,
                property: "División con exponente negativo resultante",
                explanation: "Restamos exponentes: (1/3)⁶ ÷ (1/3)⁸ = (1/3)⁶⁻⁸ = (1/3)⁻²",
                difficulty: 3
            },
            {
                question: "(2/5)³ × (5/2)³ =",
                options: ["1", "(10/10)³", "8/125", "125/8"],
                correct: 0,
                property: "Producto de fracciones inversas con igual exponente",
                explanation: "Son inversas: (2/5)³ × (5/2)³ = (2/5 × 5/2)³ = (1)³ = 1",
                difficulty: 3
            },
            {
                question: "[(3/4)⁴]^(1/2) =",
                options: ["(3/4)²", "(3/4)⁸", "9/16", "81/256"],
                correct: 0,
                property: "Potencia fraccionaria de una potencia",
                explanation: "Multiplicamos exponentes: [(3/4)⁴]^(1/2) = (3/4)⁴ˣ⁽¹/²⁾ = (3/4)²",
                difficulty: 3
            },
            {
                question: "(8/27)^(1/3) =",
                options: ["2/3", "8/27", "4/9", "1"],
                correct: 0,
                property: "Raíz cúbica como potencia fraccionaria",
                explanation: "La raíz cúbica es elevar a 1/3: (8/27)^(1/3) = ³√(8/27) = ³√8/³√27 = 2/3",
                difficulty: 3
            },
            {
                question: "(1/2)⁻³ × (1/2)⁵ =",
                options: ["(1/2)²", "(1/2)⁻¹⁵", "4", "1/4"],
                correct: 0,
                property: "Multiplicación con exponente negativo",
                explanation: "Sumamos exponentes: (1/2)⁻³ × (1/2)⁵ = (1/2)⁻³⁺⁵ = (1/2)²",
                difficulty: 3
            },
            
            // NIVEL 6: MAESTRO (Preguntas 26-30)
            {
                question: "[(1/2)³ × (1/2)²]⁻¹ =",
                options: ["(1/2)⁻⁵", "(1/2)⁵", "32", "1/32"],
                correct: 0,
                property: "Exponente negativo de un producto",
                explanation: "Primero: (1/2)³ × (1/2)² = (1/2)⁵. Luego: [(1/2)⁵]⁻¹ = (1/2)⁻⁵",
                difficulty: 3
            },
            {
                question: "(3/2)⁻² ÷ (3/2)⁻⁴ =",
                options: ["(3/2)²", "(3/2)⁻⁶", "(3/2)⁶", "4/9"],
                correct: 0,
                property: "División de exponentes negativos",
                explanation: "Restamos exponentes: (3/2)⁻² ÷ (3/2)⁻⁴ = (3/2)⁻²⁻⁽⁻⁴⁾ = (3/2)²",
                difficulty: 3
            },
            {
                question: "[(2/3)² ÷ (2/3)⁵]⁻¹ =",
                options: ["(2/3)³", "(2/3)⁻³", "8/27", "27/8"],
                correct: 0,
                property: "Combinación: división y exponente negativo",
                explanation: "(2/3)² ÷ (2/3)⁵ = (2/3)⁻³. Luego: [(2/3)⁻³]⁻¹ = (2/3)³",
                difficulty: 3
            },
            {
                question: "(16/81)^(1/4) =",
                options: ["2/3", "4/9", "8/27", "1"],
                correct: 0,
                property: "Raíz cuarta como potencia fraccionaria",
                explanation: "Raíz cuarta: (16/81)^(1/4) = ⁴√(16/81) = ⁴√16/⁴√81 = 2/3",
                difficulty: 3
            },
            {
                question: "[(1/4)⁻¹]² × (1/4)⁰ =",
                options: ["16", "4", "1/16", "1"],
                correct: 0,
                property: "Combinación múltiple de propiedades",
                explanation: "(1/4)⁻¹ = 4, entonces [4]² = 16. Y (1/4)⁰ = 1. Resultado: 16 × 1 = 16",
                difficulty: 3
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let correctAnswers = 0;
        let totalAnswered = 0;
        let answered = false;
        let level = 1;

        const medals = {
            bronze: false,
            silver: false,
            gold: false,
            diamond: false,
            master: false
        };

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // Función para aleatorizar opciones
        function shuffleOptions(question) {
            const indices = [0, 1, 2, 3];
            const shuffled = [];
            const newOptions = [];
            
            // Mezclar índices
            while (indices.length > 0) {
                const randomIndex = Math.floor(Math.random() * indices.length);
                shuffled.push(indices[randomIndex]);
                indices.splice(randomIndex, 1);
            }
            
            // Crear nuevo array de opciones
            shuffled.forEach(oldIndex => {
                newOptions.push(question.options[oldIndex]);
            });
            
            // Encontrar nueva posición de la respuesta correcta
            const newCorrectIndex = shuffled.indexOf(question.correct);
            
            return {
                options: newOptions,
                correct: newCorrectIndex
            };
        }

        let currentShuffled = null;

        function displayQuestion() {
            if (currentQuestion >= questions.length) {
                showGameOver();
                return;
            }

            const q = questions[currentQuestion];
            answered = false;

            // Aleatorizar opciones
            currentShuffled = shuffleOptions(q);

            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';

            const content = `
                <div class="question-card">
                    <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="property-hint">
                        <strong>💡 Propiedad:</strong> ${q.property}
                    </div>
                    <div class="options-grid" id="options">
                        ${currentShuffled.options.map((opt, i) => `
                            <button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>
                        `).join('')}
                    </div>
                    <div id="feedback"></div>
                </div>
            `;

            document.getElementById('gameContent').innerHTML = content;
            updateStats();
        }

        function checkAnswer(selected) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            const feedbackDiv = document.getElementById('feedback');

            totalAnswered++;

            // Usar el índice correcto aleatorizado
            const isCorrect = selected === currentShuffled.correct;

            buttons[selected].classList.add(isCorrect ? 'correct' : 'incorrect');
            buttons[currentShuffled.correct].classList.add('correct');

            if (isCorrect) {
                correctAnswers++;
                streak++;
                maxStreak = Math.max(maxStreak, streak);
                
                const points = 10 + (streak * 5) + (q.difficulty * 10);
                score += points;

                feedbackDiv.innerHTML = `
                    <div class="feedback correct">
                        ✅ ¡Correcto! +${points} puntos
                        <div class="explanation">${q.explanation}</div>
                    </div>
                `;

                checkMedals();
                checkLevelUp();
            } else {
                streak = 0;
                feedbackDiv.innerHTML = `
                    <div class="feedback incorrect">
                        ❌ Incorrecto. La respuesta correcta es: ${currentShuffled.options[currentShuffled.correct]}
                        <div class="explanation">${q.explanation}</div>
                    </div>
                `;
            }

            updateStats();

            setTimeout(() => {
                feedbackDiv.innerHTML += '<button class="next-btn" onclick="nextQuestion()">Siguiente ➡️</button>';
            }, 500);
        }

        function nextQuestion() {
            currentQuestion++;
            displayQuestion();
        }

        function checkMedals() {
            if (streak >= 3 && !medals.bronze) {
                medals.bronze = true;
                unlockMedal('bronze', 'Bronce', '¡3 respuestas seguidas!');
            }
            if (streak >= 5 && !medals.silver) {
                medals.silver = true;
                unlockMedal('silver', 'Plata', '¡5 respuestas seguidas!');
            }
            if (streak >= 7 && !medals.gold) {
                medals.gold = true;
                unlockMedal('gold', 'Oro', '¡7 respuestas seguidas!');
            }
            if (streak >= 10 && !medals.diamond) {
                medals.diamond = true;
                unlockMedal('diamond', 'Diamante', '¡10 respuestas seguidas!');
            }
        }

        function unlockMedal(medalType, name, message) {
            const medal = document.querySelector(`[data-medal="${medalType}"]`);
            medal.classList.add('earned');
            
            setTimeout(() => {
                alert(`🎉 ¡MEDALLA DESBLOQUEADA!\n\n${medal.textContent} ${name}\n${message}`);
            }, 300);
        }

        function checkLevelUp() {
            const newLevel = Math.floor(score / 100) + 1;
            if (newLevel > level) {
                level = newLevel;
                alert(`🎊 ¡NIVEL ${level}!\n¡Sigue así, campeón!`);
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('level').textContent = level;
            document.getElementById('correct').textContent = `${correctAnswers}/${totalAnswered}`;
        }

        function showGameOver() {
            const percentage = Math.round((correctAnswers / totalAnswered) * 100);
            let grade = '';
            
            if (percentage === 100) {
                grade = '👑 PERFECTO';
                medals.master = true;
                unlockMedal('master', 'Maestro', '¡Todas correctas!');
            } else if (percentage >= 90) {
                grade = '🌟 EXCELENTE';
            } else if (percentage >= 75) {
                grade = '⭐ MUY BIEN';
            } else if (percentage >= 60) {
                grade = '✓ BIEN';
            } else {
                grade = '📚 SIGUE PRACTICANDO';
            }

            const earnedMedals = Object.entries(medals)
                .filter(([_, earned]) => earned)
                .map(([type, _]) => {
                    const icons = { bronze: '🥉', silver: '🥈', gold: '🥇', diamond: '💎', master: '👑' };
                    return icons[type];
                })
                .join(' ');

            document.getElementById('gameContent').innerHTML = `
                <div class="game-over">
                    <h2>🎮 ¡Juego Terminado!</h2>
                    <div class="final-score">${score} puntos</div>
                    <div class="achievement-unlocked">
                        <h3>${grade}</h3>
                        <p>${correctAnswers} de ${totalAnswered} correctas (${percentage}%)</p>
                        <p>🔥 Racha máxima: ${maxStreak}</p>
                        <p>🏆 Nivel alcanzado: ${level}</p>
                        ${earnedMedals ? `<p style="font-size: 2em; margin-top: 10px;">Medallas: ${earnedMedals}</p>` : ''}
                    </div>
                    <button class="restart-btn" onclick="restartGame()">🔄 Jugar de Nuevo</button>
                </div>
            `;
        }

        function restartGame() {
            currentQuestion = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            correctAnswers = 0;
            totalAnswered = 0;
            level = 1;
            
            Object.keys(medals).forEach(key => medals[key] = false);
            document.querySelectorAll('.medal').forEach(m => m.classList.remove('earned'));
            
            displayQuestion();
        }

        // Iniciar el juego
        displayQuestion();
    </script>
</body>
</html>
